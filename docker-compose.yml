version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dailytracker-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dailytracker
      POSTGRES_USER: dailytracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailytracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: dailytracker-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      POSTGRES_URL: postgresql://dailytracker:${POSTGRES_PASSWORD:-changeme}@postgres:5432/dailytracker?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
