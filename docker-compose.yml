version: '3.8'

services:
  app:
    build: .
    container_name: dailytracker-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_URL: ${DB_URL:-postgres:5432}
      DB_USER: ${DB_USER:-dailytracker}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-dailytracker}
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: dailytracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-dailytracker}
      POSTGRES_USER: ${DB_USER:-dailytracker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
